<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FixMyDB Desktop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="36" height="36" rx="10" fill="url(#logo-grad)"/>
            <defs>
              <linearGradient id="logo-grad" x1="0" y1="0" x2="36" y2="36">
                <stop offset="0%" stop-color="#818cf8"/>
                <stop offset="100%" stop-color="#a78bfa"/>
              </linearGradient>
            </defs>
            <ellipse cx="18" cy="12" rx="8" ry="3.5" stroke="white" stroke-width="1.8" fill="none"/>
            <path d="M10 12v12c0 1.93 3.58 3.5 8 3.5s8-1.57 8-3.5V12" stroke="white" stroke-width="1.8" fill="none"/>
            <path d="M10 18c0 1.93 3.58 3.5 8 3.5s8-1.57 8-3.5" stroke="white" stroke-width="1.8" fill="none" opacity="0.6"/>
          </svg>
        </div>
        <div class="logo-text">
          <h1>FixMyDB</h1>
          <span class="tagline">Database Schema Analyzer</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Server Configuration</div>
      <div class="ports">
        <div class="field">
          <label for="backend-port">Backend</label>
          <div class="input-wrap">
            <span class="input-prefix">:</span>
            <input type="number" id="backend-port" value="5001" min="1024" max="65535" />
          </div>
        </div>
        <div class="field">
          <label for="frontend-port">Frontend</label>
          <div class="input-wrap">
            <span class="input-prefix">:</span>
            <input type="number" id="frontend-port" value="3000" min="1024" max="65535" />
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Status</div>
      <div class="status-area">
        <div class="status-row">
          <div class="status-indicator" id="status-indicator">
            <span class="status-dot"></span>
          </div>
          <div class="status-info">
            <span class="status-text" id="status-text">Offline</span>
            <span class="status-sub" id="status-sub">Both servers stopped</span>
          </div>
        </div>
        <a href="#" class="url-pill" id="url-pill" target="_blank" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <span id="frontend-url"></span>
        </a>
      </div>
    </div>

    <div class="actions">
      <button id="btn-start" class="btn btn-start">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Start Servers
      </button>
      <button id="btn-stop" class="btn btn-stop" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
        Stop
      </button>
    </div>

    <div class="card log-card">
      <div class="card-label">
        <span>Activity Log</span>
        <button class="log-clear" id="log-clear" title="Clear log">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="logs" id="logs">
        <div class="log-empty">Waiting for activity...</div>
      </div>
    </div>

    <div class="footer">
      <span>v1.0.0</span>
      <span class="footer-dot"></span>
      <a href="https://github.com/debudebuye/fixmydb" target="_blank">GitHub</a>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
