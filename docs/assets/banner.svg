<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#111118"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c6af7"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6af7;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#7c6af7;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7c6af7" flood-opacity="0.25"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#7c6af7" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Glowing orbs (matching website accent) -->
  <circle cx="180" cy="280" r="220" fill="url(#accentGlow)" opacity="0.35"/>
  <circle cx="1100" cy="180" r="280" fill="url(#accentGlow)" opacity="0.25"/>
  <circle cx="640" cy="520" r="200" fill="url(#accentGlow)" opacity="0.15"/>

  <!-- ── Left: Database icon with checkmark ── -->
  <g transform="translate(60, 170)" filter="url(#shadow)">
    <!-- DB cylinder -->
    <ellipse cx="90" cy="45" rx="90" ry="35" fill="none" stroke="#7c6af7" stroke-width="2.5" opacity="0.7"/>
    <rect x="0" y="45" width="180" height="180" rx="0" fill="none" stroke="#7c6af7" stroke-width="2.5" opacity="0.7"/>
    <ellipse cx="90" cy="225" rx="90" ry="35" fill="none" stroke="#7c6af7" stroke-width="2.5" opacity="0.7"/>
    <!-- Inner lines -->
    <ellipse cx="90" cy="115" rx="90" ry="35" fill="none" stroke="#7c6af7" stroke-width="1.5" opacity="0.3"/>
    <ellipse cx="90" cy="170" rx="90" ry="35" fill="none" stroke="#7c6af7" stroke-width="1.5" opacity="0.3"/>
    <!-- Green checkmark -->
    <path d="M55 140 L80 165 L130 105" fill="none" stroke="#10b981" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowFilter)"/>
  </g>

  <!-- ── Center: Title + tagline ── -->
  <text x="640" y="195" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="76" font-weight="800" fill="#f1f5f9" filter="url(#textShadow)">
    FixMyDB
  </text>
  <rect x="520" y="212" width="240" height="4" rx="2" fill="url(#accent)"/>
  <text x="640" y="255" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="24" fill="#94a3b8" font-weight="400" letter-spacing="3">
    AI-POWERED DATABASE SCHEMA REVIEWER
  </text>

  <!-- ── "No sign-up needed" badge ── -->
  <g transform="translate(640, 278)" text-anchor="middle">
    <rect x="-72" y="0" width="144" height="26" rx="13" fill="rgba(16,185,129,0.12)" stroke="#10b981" stroke-width="1"/>
    <text x="0" y="17" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="12" fill="#10b981" font-weight="600" letter-spacing="0.5">FREE &amp; OPEN SOURCE</text>
  </g>

  <!-- ── Feature grid (3 columns x 2 rows) ── -->
  <!-- Row 1 -->
  <g transform="translate(320, 330)">
    <!-- Health Score -->
    <rect x="0" y="0" width="180" height="52" rx="10" fill="rgba(124,106,247,0.08)" stroke="#252533" stroke-width="1"/>
    <circle cx="28" cy="26" r="14" fill="none" stroke="#7c6af7" stroke-width="2"/>
    <text x="28" y="31" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#7c6af7" font-weight="700">75</text>
    <text x="52" y="23" font-family="'Inter', sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">Health Score</text>
    <text x="52" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#64748b">0-100 with severity</text>

    <!-- Normalization -->
    <rect x="200" y="0" width="180" height="52" rx="10" fill="rgba(124,106,247,0.08)" stroke="#252533" stroke-width="1"/>
    <text x="228" y="23" font-family="'Inter', sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">Normalization</text>
    <text x="228" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#64748b">1NF / 2NF / 3NF check</text>

    <!-- Index Recs -->
    <rect x="400" y="0" width="180" height="52" rx="10" fill="rgba(124,106,247,0.08)" stroke="#252533" stroke-width="1"/>
    <text x="428" y="23" font-family="'Inter', sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">Index Recommendations</text>
    <text x="428" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#64748b">Composite &amp; unique indexes</text>

    <!-- Relationship Analysis -->
    <rect x="600" y="0" width="180" height="52" rx="10" fill="rgba(124,106,247,0.08)" stroke="#252533" stroke-width="1"/>
    <text x="628" y="23" font-family="'Inter', sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">Relationships</text>
    <text x="628" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#64748b">FK, circular deps, ON DELETE</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(320, 395)">
    <!-- Domain Detection -->
    <rect x="0" y="0" width="180" height="52" rx="10" fill="rgba(124,106,247,0.08)" stroke="#252533" stroke-width="1"/>
    <text x="28" y="23" font-family="'Inter', sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">Domain Detection</text>
    <text x="28" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#64748b">Financial, e-commerce, health</text>

    <!-- ER Diagram -->
    <rect x="200" y="0" width="180" height="52" rx="10" fill="rgba(16,185,129,0.08)" stroke="#252533" stroke-width="1"/>
    <text x="228" y="23" font-family="'Inter', sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">ER Diagram</text>
    <text x="228" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#64748b">Interactive &amp; exportable PNG</text>

    <!-- AI Enhancement -->
    <rect x="400" y="0" width="180" height="52" rx="10" fill="rgba(124,106,247,0.08)" stroke="#252533" stroke-width="1"/>
    <text x="428" y="23" font-family="'Inter', sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">AI Enhancement</text>
    <text x="428" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#64748b">OpenAI, Gemini, Groq</text>

    <!-- SQL Fix Scripts -->
    <rect x="600" y="0" width="180" height="52" rx="10" fill="rgba(16,185,129,0.08)" stroke="#252533" stroke-width="1"/>
    <text x="628" y="23" font-family="'Inter', sans-serif" font-size="13" fill="#e2e8f0" font-weight="600">SQL Fix Scripts</text>
    <text x="628" y="38" font-family="'Inter', sans-serif" font-size="10" fill="#64748b">One-click ALTER TABLE output</text>
  </g>

  <!-- ── Left bottom: Code snippet with issue highlight ── -->
  <g transform="translate(40, 460)" opacity="0.7">
    <rect width="380" height="145" rx="10" fill="#111118" stroke="#252533" stroke-width="1"/>
    <!-- Title bar dots -->
    <circle cx="20" cy="16" r="5" fill="#f43f5e" opacity="0.8"/>
    <circle cx="36" cy="16" r="5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="52" cy="16" r="5" fill="#10b981" opacity="0.8"/>
    <text x="190" y="20" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#64748b">schema.sql</text>

    <text x="16" y="48" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="12" fill="#7c6af7">CREATE TABLE</text>
    <text x="16" y="66" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#e2e8f0">  users (</text>
    <text x="16" y="84" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#a78bfa">    id</text>
    <text x="52" y="84" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#e2e8f0"> SERIAL </text>
    <text x="118" y="84" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#10b981">PRIMARY KEY</text>
    <text x="16" y="102" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#a78bfa">    email</text>
    <text x="72" y="102" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#e2e8f0"> VARCHAR(255)</text>
    <text x="16" y="120" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#e2e8f0">);</text>
    <!-- Highlight issue -->
    <rect x="68" y="95" width="130" height="13" rx="3" fill="rgba(245,158,11,0.15)"/>
    <text x="208" y="105" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#f59e0b">← missing NOT NULL</text>
  </g>

  <!-- ── Right bottom: Score + stats panel ── -->
  <g transform="translate(860, 460)" opacity="0.85">
    <rect width="380" height="145" rx="10" fill="#111118" stroke="#252533" stroke-width="1"/>
    <!-- Title -->
    <text x="190" y="24" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#64748b" font-weight="500" letter-spacing="1">ANALYSIS RESULT</text>

    <!-- Score circle -->
    <circle cx="80" cy="88" r="44" fill="none" stroke="rgba(124,106,247,0.15)" stroke-width="7"/>
    <circle cx="80" cy="88" r="44" fill="none" stroke="#7c6af7" stroke-width="7" stroke-dasharray="200 76" stroke-linecap="round" transform="rotate(-90 80 88)"/>
    <text x="80" y="68" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8">Health</text>
    <text x="80" y="100" text-anchor="middle" font-family="'Inter', sans-serif" font-size="32" fill="#f1f5f9" font-weight="700">75</text>
    <text x="80" y="118" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#64748b">/ 100</text>

    <!-- Stats columns -->
    <text x="210" y="56" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#64748b">Issues Found</text>
    <text x="210" y="80" text-anchor="middle" font-family="'Inter', sans-serif" font-size="22" fill="#f43f5e" font-weight="700">12</text>
    <text x="210" y="100" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#64748b">Suggestions</text>
    <text x="210" y="124" text-anchor="middle" font-family="'Inter', sans-serif" font-size="22" fill="#10b981" font-weight="700">8</text>
    <text x="320" y="56" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#64748b">Tables</text>
    <text x="320" y="80" text-anchor="middle" font-family="'Inter', sans-serif" font-size="22" fill="#7c6af7" font-weight="700">14</text>
    <text x="320" y="100" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#64748b">Indexes</text>
    <text x="320" y="124" text-anchor="middle" font-family="'Inter', sans-serif" font-size="22" fill="#06b6d4" font-weight="700">6</text>
  </g>

  <!-- ── Bottom accent bar ── -->
  <rect x="0" y="628" width="1280" height="12" fill="url(#accent)" opacity="0.5"/>
</svg>