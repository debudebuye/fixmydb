<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#667eea" flood-opacity="0.3"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.05" stroke="#667eea" stroke-width="1">
    <line x1="0" y1="128" x2="1280" y2="128"/>
    <line x1="0" y1="256" x2="1280" y2="256"/>
    <line x1="0" y1="384" x2="1280" y2="384"/>
    <line x1="0" y1="512" x2="1280" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="640"/>
    <line x1="512" y1="0" x2="512" y2="640"/>
    <line x1="768" y1="0" x2="768" y2="640"/>
    <line x1="1024" y1="0" x2="1024" y2="640"/>
  </g>

  <!-- Glowing orbs -->
  <circle cx="200" cy="300" r="200" fill="url(#glow)" opacity="0.4"/>
  <circle cx="1080" cy="200" r="250" fill="url(#glow)" opacity="0.3"/>
  <circle cx="640" cy="500" r="180" fill="url(#glow)" opacity="0.2"/>

  <!-- Database icon (left side) -->
  <g transform="translate(120, 180)" filter="url(#shadow)">
    <!-- Database cylinder -->
    <ellipse cx="80" cy="40" rx="80" ry="30" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>
    <rect x="0" y="40" width="160" height="160" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>
    <ellipse cx="80" cy="200" rx="80" ry="30" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>
    <!-- DB lines -->
    <ellipse cx="80" cy="100" rx="80" ry="30" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
    <ellipse cx="80" cy="150" rx="80" ry="30" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
    <!-- Checkmark -->
    <path d="M50 120 L70 140 L110 90" fill="none" stroke="#4ade80" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Main title -->
  <text x="640" y="220" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white" filter="url(#textShadow)">
    FixMyDB
  </text>

  <!-- Accent line -->
  <rect x="540" y="240" width="200" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="640" y="290" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="28" fill="#a5b4fc" font-weight="400" letter-spacing="2">
    AI-POWERED DATABASE SCHEMA REVIEWER
  </text>

  <!-- Feature pills -->
  <g transform="translate(640, 340)" text-anchor="middle">
    <rect x="-240" y="0" width="120" height="32" rx="16" fill="rgba(102,126,234,0.2)" stroke="#667eea" stroke-width="1"/>
    <text x="-180" y="21" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#c4b5fd" font-weight="500">Health Score</text>

    <rect x="-100" y="0" width="120" height="32" rx="16" fill="rgba(102,126,234,0.2)" stroke="#667eea" stroke-width="1"/>
    <text x="-40" y="21" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#c4b5fd" font-weight="500">ER Diagrams</text>

    <rect x="40" y="0" width="130" height="32" rx="16" fill="rgba(102,126,234,0.2)" stroke="#667eea" stroke-width="1"/>
    <text x="105" y="21" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#c4b5fd" font-weight="500">AI Analysis</text>

    <rect x="190" y="0" width="140" height="32" rx="16" fill="rgba(102,126,234,0.2)" stroke="#667eea" stroke-width="1"/>
    <text x="260" y="21" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#c4b5fd" font-weight="500">SQL Fix Scripts</text>
  </g>

  <!-- Code snippet decoration (bottom left) -->
  <g transform="translate(80, 430)" opacity="0.6">
    <rect width="320" height="140" rx="8" fill="rgba(0,0,0,0.4)" stroke="rgba(102,126,234,0.3)" stroke-width="1"/>
    <text x="16" y="28" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#667eea">CREATE TABLE</text>
    <text x="16" y="48" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#e2e8f0">  users (</text>
    <text x="16" y="68" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#c4b5fd">    id</text>
    <text x="56" y="68" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#e2e8f0"> SERIAL </text>
    <text x="126" y="68" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#4ade80">PRIMARY KEY</text>
    <text x="16" y="88" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#c4b5fd">    email</text>
    <text x="80" y="88" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#e2e8f0"> VARCHAR(255)</text>
    <text x="16" y="108" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#e2e8f0">);</text>
    <!-- Highlight issue -->
    <rect x="76" y="82" width="140" height="14" rx="2" fill="rgba(251,191,36,0.2)"/>
    <text x="226" y="93" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="10" fill="#fbbf24">← missing NOT NULL</text>
  </g>

  <!-- Score badge (bottom right) -->
  <g transform="translate(880, 430)" opacity="0.8">
    <rect width="300" height="140" rx="8" fill="rgba(0,0,0,0.4)" stroke="rgba(102,126,234,0.3)" stroke-width="1"/>
    <text x="150" y="30" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#94a3b8" font-weight="500">HEALTH SCORE</text>
    <!-- Score circle -->
    <circle cx="100" cy="90" r="40" fill="none" stroke="rgba(102,126,234,0.2)" stroke-width="6"/>
    <circle cx="100" cy="90" r="40" fill="none" stroke="#667eea" stroke-width="6" stroke-dasharray="188 64" stroke-linecap="round" transform="rotate(-90 100 90)"/>
    <text x="100" y="97" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" fill="white" font-weight="700">75</text>
    <!-- Stats -->
    <text x="200" y="65" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#94a3b8">Issues Found</text>
    <text x="200" y="82" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" fill="#f87171" font-weight="600">12</text>
    <text x="200" y="105" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#94a3b8">Suggestions</text>
    <text x="200" y="122" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" fill="#4ade80" font-weight="600">8</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="620" width="1280" height="20" fill="url(#accent)" opacity="0.6"/>
</svg>