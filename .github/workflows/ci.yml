name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package.json

      - run: npm install

      - run: npm run lint

      - run: npm run test

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package.json

      - run: npm install

      - run: npm run lint

      - run: npm run test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - run: docker compose build

  desktop:
    name: Desktop (${{ matrix.os }})
    needs: [frontend]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package.json

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - run: npm install

      - name: Build for Linux
        if: runner.os == 'Linux'
        run: npx electron-builder --linux

      - name: Build for Windows
        if: runner.os == 'Windows'
        run: npx electron-builder --win

      - name: Build for macOS
        if: runner.os == 'macOS'
        run: npx electron-builder --mac

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.blockmap
            desktop/dist/builder-debug.yml

  release:
    name: GitHub Release
    if: github.event_name == 'push' && github.ref_name == 'master'
    needs: [desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: desktop-Linux
          path: artifacts/linux

      - uses: actions/download-artifact@v4
        with:
          name: desktop-Windows
          path: artifacts/windows

      - uses: actions/download-artifact@v4
        with:
          name: desktop-macOS
          path: artifacts/macos

      - name: Generate release tag
        run: echo "RELEASE_TAG=v$(date +'%Y%m%d.%H%M%S')" >> $GITHUB_ENV

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: FixMyDB Desktop ${{ env.RELEASE_TAG }}
          body: |
            Automated desktop build from main branch.

            ## Downloads
            - **Linux**: AppImage & deb packages
            - **Windows**: NSIS installer
            - **macOS**: DMG & ZIP
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.blockmap
          draft: false
          prerelease: false
